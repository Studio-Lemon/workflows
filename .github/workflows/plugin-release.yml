name: Create plugin release zip

on:
  # Allow this workflow to be called from another repo (reusable workflow)
  workflow_call:
    inputs:
      plugin_name:
        description: "Logical plugin name (e.g. lemon-woo). Workflow will append .zip if needed."
        required: true
        type: string
        default: "plugin"

jobs:
  create_zip:
    name: Build release zip
    runs-on: ubuntu-latest
    env:
      PLUGIN_DIR: .
      PLUGIN_NAME: ${{ inputs.plugin_name }}
      BUILD_COMMANDS: |
        npm install
        npm run build:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build plugin
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          set -e
          echo "Running build commands in $(pwd)"
          bash -lc "$BUILD_COMMANDS"

      - name: Create zip archive
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          # Create base archive with prefix
          git archive --format=zip --prefix=$PLUGIN_NAME/ HEAD -o $PLUGIN_NAME.zip

          # Create temp directory for adding extra folders
          mkdir -p .zip-temp/$PLUGIN_NAME

          # include dist automatically if present
          if [ -d "dist" ]; then
            cp -r dist .zip-temp/$PLUGIN_NAME/
            (cd .zip-temp && zip -ur ../$PLUGIN_NAME.zip $PLUGIN_NAME/dist)
          fi

          # include blocks automatically if present
          if [ -d "blocks" ]; then
            cp -r blocks .zip-temp/$PLUGIN_NAME/
            (cd .zip-temp && zip -ur ../$PLUGIN_NAME.zip $PLUGIN_NAME/blocks)
          fi

          # Cleanup
          rm -rf .zip-temp

      - name: Release (create GitHub release and upload assets)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.PLUGIN_NAME }}.zip
